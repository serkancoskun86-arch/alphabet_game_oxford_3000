<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Adventure - Fix Version</title>
    <style>
        :root { --coral: #ff8b94; --mint: #a8e6cf; --gold: #ffd080; --soft-blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #game-area { position: relative; width: 500px; height: 500px; margin: 20px; border-radius: 50%; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .letter { position: absolute; width: 40px; height: 40px; background: white; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; transform: translate(-50%, -50%); z-index: 5; }
        .active { background: var(--gold) !important; transform: translate(-50%, -50%) scale(1.3); z-index: 10; border-color: white; }
        .correct { background: var(--mint) !important; color: white; }
        .wrong { background: var(--coral) !important; color: white; }
        .passed { background: #dfe6e9 !important; border-style: dashed; }
        #panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 450px; text-align: center; display:none; }
        input { padding: 12px; width: 80%; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; font-size: 1.2rem; text-align: center; }
        #debug-log { background: #333; color: #0f0; padding: 10px; width: 90%; max-width: 600px; font-family: monospace; font-size: 12px; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Word Adventure 🎡</h1>
    
    <div id="game-area">
        <div id="wheel"></div>
        <div id="overlay" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100; text-align: center;">
            <button onclick="startGame('A1')" style="padding:15px 30px; cursor:pointer; background:var(--mint); border:none; border-radius:10px; margin:5px;">START GAME</button>
            <p id="load-status" style="font-size: 0.8rem; color: #666;">Checking words.js...</p>
        </div>
    </div>

    <div id="panel">
        <div id="timer" style="font-size:1.5rem; font-weight:bold;">05:00</div>
        <p id="definition" style="min-height:50px;"></p>
        <p id="hint-area" style="color:orange; font-weight:bold;"></p>
        <input type="text" id="userInput" placeholder="Answer...">
    </div>

    <div id="debug-log">Log: Waiting for interaction...</div>

    <script src="words.js"></script>

    <script>
        const log = (msg) => { document.getElementById('debug-log').innerText += "\n> " + msg; };
        let session = [], currentIdx = 0, timer;
        let audioCtx;

        // Check if data is loaded immediately
        window.onload = () => {
            if (window.allWords) {
                log("Success: words.js loaded! " + window.allWords.length + " words found.");
                document.getElementById('load-status').innerText = "✅ Ready to play!";
            } else {
                log("ERROR: words.js NOT found or window.allWords is missing!");
                document.getElementById('load-status').innerText = "❌ words.js not found!";
                document.getElementById('load-status').style.color = "red";
            }
        };

        function startGame(level) {
            log("Attempting to start game...");
            if (!window.allWords) {
                alert("Cannot start: words.js data is missing. Make sure the file is in the same folder.");
                return;
            }

            try {
                const alphabet = "ABCDEFGHIKLMNOPQRSTUVWYZ".split("");
                session = alphabet.map(char => {
                    const pool = window.allWords.filter(w => w.l === char);
                    return { ...pool[0], status: 'pending' }; 
                });

                document.getElementById('overlay').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                
                renderWheel();
                refreshUI();
                log("Game started successfully.");
            } catch (e) {
                log("CRASH: " + e.message);
            }
        }

        function renderWheel() {
            const wheel = document.getElementById('wheel');
            const radius = 210;
            session.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'letter';
                div.id = `letter-${i}`;
                div.innerText = item.l;
                const angle = (i / session.length) * (Math.PI * 2) - (Math.PI / 2);
                div.style.left = (250 + radius * Math.cos(angle)) + 'px';
                div.style.top = (250 + radius * Math.sin(angle)) + 'px';
                wheel.appendChild(div);
            });
        }

        function refreshUI() {
            session.forEach((w, i) => {
                const el = document.getElementById(`letter-${i}`);
                if(el) el.className = `letter ${w.status} ${i === currentIdx ? 'active' : ''}`;
            });
            document.getElementById('definition').innerText = session[currentIdx].q;
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').focus();
        }

        // Simpler check for testing
        document.getElementById('userInput').onkeypress = (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase();
                if (session[currentIdx].a.includes(val)) {
                    session[currentIdx].status = 'correct';
                } else {
                    session[currentIdx].status = 'wrong';
                }
                currentIdx = (currentIdx + 1) % session.length;
                refreshUI();
            }
        };
    </script>
</body>
</html>
