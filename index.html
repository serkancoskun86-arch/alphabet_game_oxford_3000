        { L: 'Z', q: 'Zero point of temperature.', a: ['zero'], cefr: 'A1' },
        { L: 'Z', q: 'To focus on something.', a: ['zoom'], cefr: 'B1' },
        { L: 'Z', q: 'A person with great energy.', a: ['zest'], cefr: 'B1' },
        { L: 'Z', q: 'A type of musical instrument.', a: ['zither'], cefr: 'B1' }
    ];

    // --- GAME ENGINE ---
    let currentSessionWords = [];
    let currentIndex = 0, timeLeft = 0, timerId, score = 0, results = [], hintUsed = false;
    
    const configs = {
        easy: { cefr: 'A1', time: 240, hintPenalty: 20, wrongPenalty: 10 },
        medium: { cefr: 'A2', time: 180, hintPenalty: 50, wrongPenalty: 25 },
        hard: { cefr: 'B1', time: 120, hintPenalty: 70, wrongPenalty: 50 }
    };

    function prepareSession(diff) {
        const targetLevel = configs[diff].cefr;
        const selected = [];
        const alphabet = "ABCDEFGHIKLMNOPQRSTUVWYZ".split("");
        
        alphabet.forEach(letter => {
            let matches = allWords.filter(w => w.L === letter && w.cefr === targetLevel);
            if (matches.length === 0) matches = allWords.filter(w => w.L === letter);
            if (matches.length > 0) {
                selected.push(matches[Math.floor(Math.random() * matches.length)]);
            }
        });
        return selected;
    }

    function createWheel() {
        const container = document.getElementById('game-container');
        container.innerHTML = ""; 
        const total = currentSessionWords.length;
        for (let i = 0; i < total; i++) {
            const div = document.createElement('div');
            div.className = 'letter-node';
            div.id = `node-${i}`;
            div.innerText = currentSessionWords[i].L;
            const angle = (i / total) * 2 * Math.PI - Math.PI / 2;
            div.style.left = (275 + 245 * Math.cos(angle)) + 'px';
            div.style.top = (275 + 245 * Math.sin(angle)) + 'px';
            container.appendChild(div);
        }
    }

    function startGame(diff) {
        currentDiff = diff;
        currentSessionWords = prepareSession(diff);
        createWheel();
        score = 0; currentIndex = 0; timeLeft = configs[diff].time;
        results = Array(currentSessionWords.length).fill(null);
        document.getElementById('score-display').innerText = `Score: 0`;
        document.getElementById('diff-select').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
        updateDisplay();
        startTimer();
    }

    function startTimer() {
        if (timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60), secs = timeLeft % 60;
            document.getElementById('timer').innerText = mins.toString().padStart(2, '0') + ":" + secs.toString().padStart(2, '0');
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);
    }

    function checkAnswer() {
        const val = document.getElementById('answer-input').value.toLowerCase().trim();
        if (!val) return;
        const cfg = configs[currentDiff];
        if (currentSessionWords[currentIndex].a.includes(val)) {
            results[currentIndex] = 1;
            score += hintUsed ? (100 - cfg.hintPenalty) : 100;
        } else {
            results[currentIndex] = 0;
            score -= cfg.wrongPenalty;
        }
        document.getElementById('score-display').innerText = `Score: ${score}`;
        currentIndex = (currentIndex + 1) % currentSessionWords.length;
        updateDisplay();
    }

    function handlePass() {
        results[currentIndex] = 2;
        currentIndex = (currentIndex + 1) % currentSessionWords.length;
        updateDisplay();
    }

    function showHint() {
        if (hintUsed) return;
        hintUsed = true;
        const word = currentSessionWords[currentIndex].a[0];
        document.getElementById('hint-display').innerText = word[0].toUpperCase() + " " + "_ ".repeat(word.length-2) + word[word.length-1].toUpperCase();
    }

    function updateDisplay() {
        hintUsed = false;
        document.getElementById('hint-display').innerText = "";
        document.getElementById('answer-input').value = "";
        document.getElementById('answer-input').focus();
        
        const allDone = results.every(r => r === 1 || r === 0);
        if (allDone) return endGame("WINNER!");

        while (results[currentIndex] === 1 || results[currentIndex] === 0) {
            currentIndex = (currentIndex + 1) % currentSessionWords.length;
        }

        document.querySelectorAll('.letter-node').forEach((el, idx) => {
            el.className = 'letter-node' + (results[idx] === 1 ? ' correct' : results[idx] === 0 ? ' wrong' : results[idx] === 2 ? ' passed' : '');
            if (idx === currentIndex) el.classList.add('active');
        });
        document.getElementById('definition-display').innerText = currentSessionWords[currentIndex].L + ": " + currentSessionWords[currentIndex].q;
    }

    function endGame(msg) {
        clearInterval(timerId);
        document.getElementById('controls').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'inline-block';
        document.getElementById('definition-display').innerHTML = `<h2>${msg}</h2><p>Final Score: ${score}</p>`;
    }

    document.getElementById('answer-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAnswer(); });
</script>
</body>
</html>
