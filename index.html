<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford 3000 - Ultimate Alphabet Challenge</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; min-height: 100vh; }
        h1 { color: #38bdf8; margin: 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        
        .stats-bar { display: flex; gap: 40px; margin: 15px 0; background: rgba(30, 41, 59, 0.7); padding: 10px 30px; border-radius: 50px; border: 1px solid #334155; }
        #timer, #score-display { font-size: 1.8rem; font-weight: bold; color: #38bdf8; font-variant-numeric: tabular-nums; }
        #score-display { color: #f59e0b; }

        #game-container { position: relative; width: 460px; height: 460px; margin: 10px auto; }
        .letter-node { position: absolute; width: 36px; height: 36px; background: #1e293b; border: 2px solid #38bdf8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translate(-50%, -50%); font-size: 0.85rem; z-index: 10; color: #38bdf8; }
        
        .correct { background: #22c55e !important; border-color: #fff; color: white; box-shadow: 0 0 15px #22c55e; }
        .wrong { background: #ef4444 !important; border-color: #fff; color: white; }
        .passed { background: #f59e0b !important; border-color: #fff; color: white; }
        .active { background: #38bdf8 !important; border-color: #fff; color: #0f172a; transform: translate(-50%, -50%) scale(1.4); z-index: 20; box-shadow: 0 0 25px #38bdf8; }

        #ui-overlay { text-align: center; width: 100%; max-width: 580px; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #334155; position: relative; }
        #definition-display { font-size: 1.3rem; min-height: 70px; margin-bottom: 5px; line-height: 1.4; display: flex; align-items: center; justify-content: center; font-weight: 500; }
        #hint-display { font-size: 1.2rem; color: #f59e0b; min-height: 35px; margin-bottom: 15px; font-family: 'Courier New', Courier, monospace; letter-spacing: 4px; font-weight: bold; }

        .controls, .difficulty-select { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        input { padding: 14px; font-size: 1.1rem; border-radius: 10px; border: 2px solid #334155; width: 200px; background: #0f172a; color: white; outline: none; text-align: center; transition: border-color 0.3s; }
        input:focus { border-color: #38bdf8; }

        button { padding: 12px 20px; font-size: 1rem; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; color: white; transition: all 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        .diff-easy { background: #22c55e; }
        .diff-medium { background: #f59e0b; }
        .diff-hard { background: #ef4444; }
        
        #mute-btn { background: transparent; border: 1px solid #334155; color: #94a3b8; font-size: 0.8rem; margin-bottom: 10px; }
        #restart-btn { background: #38bdf8; color: #0f172a; margin-top: 20px; padding: 15px 40px; }
    </style>
</head>
<body>

    <h1>Oxford 3000 Challenge</h1>
    
    <div class="stats-bar">
        <div id="timer">00:00</div>
        <div id="score-display">Score: 0</div>
    </div>
    
    <button id="mute-btn" onclick="toggleMute()">🔊 SOUND: ON</button>

    <div id="game-container"></div>

    <div id="ui-overlay">
        <div id="definition-display">Choose your difficulty level to start the engine!</div>
        <div id="hint-display"></div>
        
        <div class="difficulty-select" id="diff-select">
            <button class="diff-easy" onclick="startGame('easy')">EASY (3 MIN)</button>
            <button class="diff-medium" onclick="startGame('medium')">MEDIUM (2 MIN)</button>
            <button class="diff-hard" onclick="startGame('hard')">HARD (1 MIN)</button>
        </div>

        <div class="controls" id="controls" style="display:none;">
            <input type="text" id="answer-input" placeholder="Type here..." autocomplete="off">
            <button style="background:#22c55e" onclick="checkAnswer()">CHECK</button>
            <button style="background:#6366f1" onclick="showHint()">HINT (-50)</button>
            <button style="background:#f59e0b" onclick="handlePass()">PASS</button>
        </div>
        
        <button id="restart-btn" style="display:none;" onclick="location.reload()">BACK TO MENU</button>
    </div>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
    <audio id="snd-finish" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    // --- GÜNCEL KELİME HAVUZU (Sızıntı Önlenmiş Sorular) ---
    const allWords = [
        { L: 'A', q: 'The location where you go to catch a flight.', a: ['airport'] },
        { L: 'A', q: 'To say "yes" to an offer or an invitation.', a: ['accept'] },
        { L: 'B', q: 'The first meal of the day, eaten after waking up.', a: ['breakfast'] },
        { L: 'B', q: 'A professional who styles or cuts men\'s hair.', a: ['barber'] },
        { L: 'C', q: 'The primary city where a nation\'s government is based.', a: ['capital'] },
        { L: 'C', q: 'An optical device used for capturing photos or videos.', a: ['camera'] },
        { L: 'D', q: 'The specialist you visit for problems with your teeth.', a: ['dentist'] },
        { L: 'D', q: 'A reference book used to find the meanings of words.', a: ['dictionary'] },
        { L: 'E', q: 'A massive gray mammal known for its long trunk and tusks.', a: ['elephant'] },
        { L: 'E', q: 'The natural world, including air, water, and land.', a: ['environment'] },
        { L: 'F', q: 'The season between summer and winter.', a: ['fall', 'autumn'] },
        { L: 'F', q: 'Known and recognized by a very large number of people.', a: ['famous'] },
        { L: 'G', q: 'An outdoor area next to a home for growing plants.', a: ['garden', 'yard'] },
        { L: 'H', q: 'A medical institution where patients receive treatment.', a: ['hospital'] },
        { L: 'I', q: 'Something that cannot happen or be achieved.', a: ['impossible'] },
        { L: 'J', q: 'A piece of clothing for the upper body, often worn for warmth.', a: ['jacket', 'coat'] },
        { L: 'K', q: 'A small metal tool used for opening or locking doors.', a: ['key'] },
        { L: 'L', q: 'To use your ears to pay attention to a sound.', a: ['listen'] },
        { L: 'M', q: 'A story or drama shown on a screen at the cinema.', a: ['movie', 'film'] },
        { L: 'N', q: 'A person who lives in a house or apartment next to yours.', a: ['neighbor', 'neighbour'] },
        { L: 'O', q: 'The vast body of salt water covering most of the Earth.', a: ['ocean', 'sea'] },
        { L: 'P', q: 'A social event where people celebrate together.', a: ['party'] },
        { L: 'Q', q: 'A female sovereign who rules a country.', a: ['queen'] },
        { L: 'R', q: 'A natural stream of water that flows towards the sea.', a: ['river'] },
        { L: 'S', q: 'An institution where children and teenagers are educated.', a: ['school'] },
        { L: 'T', q: 'A long vehicle that travels along metal tracks.', a: ['train'] },
        { L: 'U', q: 'A folding device used for protection against rain.', a: ['umbrella'] },
        { L: 'V', q: 'A small settlement, typically in a rural area.', a: ['village'] },
        { L: 'W', q: 'The transparent liquid essential for all living things.', a: ['water'] },
        { L: 'Y', q: 'A period of 365 days or 12 months.', a: ['year'] },
        { L: 'Z', q: 'An area where wild animals are kept for public viewing.', a: ['zoo'] }
    ];

    let currentSessionWords = [];
    let currentIndex = 0, timeLeft = 0, timerId, isMuted = false;
    let score = 0, results = [], hintUsed = false, currentDiff = '';

    const configs = {
        easy: { time: 180, hintPenalty: 20, wrongPenalty: 10 },
        medium: { time: 120, hintPenalty: 50, wrongPenalty: 25 },
        hard: { time: 60, hintPenalty: 70, wrongPenalty: 50 }
    };

    function prepareSession() {
        const selected = [];
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
            const matches = allWords.filter(w => w.L === letter);
            if (matches.length > 0) selected.push(matches[Math.floor(Math.random() * matches.length)]);
        });
        return selected;
    }

    function createWheel() {
        const container = document.getElementById('game-container');
        container.innerHTML = ""; 
        const total = currentSessionWords.length;
        for (let i = 0; i < total; i++) {
            const div = document.createElement('div');
            div.className = 'letter-node';
            div.id = `node-${i}`;
            div.innerText = currentSessionWords[i].L;
            const angle = (i / total) * 2 * Math.PI - Math.PI / 2;
            div.style.left = (230 + 195 * Math.cos(angle)) + 'px';
            div.style.top = (230 + 195 * Math.sin(angle)) + 'px';
            container.appendChild(div);
        }
    }

    function startGame(diff) {
        currentDiff = diff;
        currentSessionWords = prepareSession();
        createWheel();
        
        score = 0;
        currentIndex = 0;
        timeLeft = configs[diff].time;
        results = Array(currentSessionWords.length).fill(null);
        
        document.getElementById('score-display').innerText = `Score: 0`;
        document.getElementById('diff-select').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
        
        updateDisplay();
        startTimer();
    }

    function startTimer() {
        if (timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timer').innerText = mins.toString().padStart(2, '0') + ":" + secs.toString().padStart(2, '0');
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);
    }

    function showHint() {
        if (hintUsed) return;
        hintUsed = true;
        const word = currentSessionWords[currentIndex].a[0];
        let display = word[0].toUpperCase() + " ";
        for(let i=1; i<word.length-1; i++) display += "_ ";
        if(word.length > 1) display += word[word.length-1].toUpperCase();
        document.getElementById('hint-display').innerText = display;
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input');
        const val = input.value.toLowerCase().trim();
        if (!val) return;

        const cfg = configs[currentDiff];
        if (currentSessionWords[currentIndex].a.includes(val)) {
            results[currentIndex] = 1;
            score += hintUsed ? (100 - cfg.hintPenalty) : 100;
            playSound('snd-correct');
        } else {
            results[currentIndex] = 0;
            score -= cfg.wrongPenalty;
            playSound('snd-wrong');
        }
        
        document.getElementById('score-display').innerText = `Score: ${score}`;
        currentIndex = (currentIndex + 1) % currentSessionWords.length;
        updateDisplay();
    }

    function handlePass() {
        results[currentIndex] = 2; // Yellow
        currentIndex = (currentIndex + 1) % currentSessionWords.length;
        updateDisplay();
    }

    function updateDisplay() {
        hintUsed = false;
        document.getElementById('hint-display').innerText = "";
        document.getElementById('answer-input').value = "";
        document.getElementById('answer-input').focus();

        const allDone = results.every(r => r === 1 || r === 0);
        if (allDone) return endGame("CONGRATULATIONS!");

        while (results[currentIndex] === 1 || results[currentIndex] === 0) {
            currentIndex = (currentIndex + 1) % currentSessionWords.length;
        }

        document.querySelectorAll('.letter-node').forEach((el, idx) => {
            el.className = 'letter-node';
            if (results[idx] === 1) el.classList.add('correct');
            else if (results[idx] === 0) el.classList.add('wrong');
            else if (results[idx] === 2) el.classList.add('passed');
            if (idx === currentIndex) el.classList.add('active');
        });

        const qText = currentSessionWords[currentIndex].q;
        document.getElementById('definition-display').innerText = currentSessionWords[currentIndex].L + ": " + qText;
        speakQuestion(qText);
    }

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('mute-btn').innerText = isMuted ? "🔇 SOUND: OFF" : "🔊 SOUND: ON";
        if (isMuted) window.speechSynthesis.cancel();
    }

    function playSound(id) {
        if (isMuted) return;
        const s = document.getElementById(id);
        s.currentTime = 0; s.play().catch(()=>{});
    }

    function speakQuestion(text) {
        if (isMuted) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.95;
        window.speechSynthesis.speak(msg);
    }

    function endGame(msg) {
        clearInterval(timerId);
        window.speechSynthesis.cancel();
        playSound('snd-finish');
        document.getElementById('controls').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'inline-block';
        document.getElementById('definition-display').innerHTML = `<div><h2 style="color:#38bdf8">${msg}</h2><p>Final Score: ${score}<br>Level: ${currentDiff.toUpperCase()}</p></div>`;
    }

    document.getElementById('answer-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkAnswer();
        if (e.key === 'Escape') handlePass();
    });
</script>
</body>
</html>
