<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oxford 600 - Ultimate Adventure</title>
    <style>
        :root { --coral: #ff8b94; --mint: #a8e6cf; --gold: #ffd080; --soft-blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; touch-action: manipulation; }
        
        /* Heyecan Modu: Son 30 Saniye Efekti */
        @keyframes pulse-red {
            0% { transform: scale(1); color: #333; }
            50% { transform: scale(1.1); color: #e74c3c; }
            100% { transform: scale(1); color: #333; }
        }
        .urgent { animation: pulse-red 1s infinite; color: #e74c3c !important; font-weight: 900; }

        #game-area { position: relative; width: 85vw; height: 85vw; max-width: 450px; max-height: 450px; margin: 15px auto; border-radius: 50%; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .letter { position: absolute; width: 35px; height: 35px; background: white; border: 2px solid #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; transform: translate(-50%, -50%); transition: 0.3s; z-index: 5; }
        
        .active { background: var(--gold) !important; scale: 1.3; z-index: 10; border-color: white; box-shadow: 0 0 15px rgba(255, 208, 128, 0.6); }
        .correct { background: var(--mint) !important; color: white; border: none; }
        .wrong { background: var(--coral) !important; color: white; border: none; }
        .passed { background: #dfe6e9 !important; border-style: dashed; color: #636e72; }

        #panel { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 450px; text-align: center; display:none; }
        #timer { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; color: #333; transition: 0.3s; }
        #definition { font-size: 1.1rem; min-height: 60px; line-height: 1.4; color: #444; margin: 10px 0; }
        #hint-area { color: #e67e22; font-weight: bold; letter-spacing: 2px; font-family: monospace; margin-bottom: 10px; min-height: 20px; }
        
        input { padding: 15px; width: 100%; border: 2px solid #f0f0f0; border-radius: 15px; font-size: 1.2rem; text-align: center; box-sizing: border-box; outline: none; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 1rem; flex: 1; }
        .btn-check { background: var(--soft-blue); flex: 1 1 100%; margin-bottom: 5px; }
        .btn-hint { background: #f1c40f; }
        .btn-pass { background: #95a5a6; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(255,255,255,0.95); border-radius: 50%; }
        .lvl-btn { background: var(--soft-blue); width: 70%; margin: 8px; padding: 15px; border-radius: 12px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>Word Adventure 🎡</h1>

    <div id="game-area">
        <div id="wheel"></div>
        <div id="overlay">
            <h3 style="margin-bottom:15px; color:#2d3436;">Select Challenge</h3>
            <button class="lvl-btn" style="background:var(--mint); color:#333;" onclick="startGame('A1')">Beginner (3 Min)</button>
            <button class="lvl-btn" style="background:var(--gold); color:#333;" onclick="startGame('A2')">Elementary (4 Min)</button>
            <button class="lvl-btn" style="background:var(--coral);" onclick="startGame('B1')">Intermediate (5 Min)</button>
        </div>
    </div>

    <div id="panel">
        <div id="timer">00:00</div>
        <p id="definition">Preparing...</p>
        <p id="hint-area"></p>
        <input type="text" id="userInput" placeholder="Type answer..." autocomplete="off" inputmode="text" enterkeyhint="go">
        <div class="controls">
            <button class="btn-check" onclick="handleCheck()">CHECK</button>
            <button class="btn-hint" onclick="getHint()">HINT</button>
            <button class="btn-pass" onclick="handlePass()">PASS</button>
        </div>
    </div>

    <script src="words.js"></script>

    <script>
        let session = [], currentIdx = 0, timeLeft = 0, timerInterval;
        let audioCtx, musicGain, isMusicOn = true;
        const alphabet = "ABCDEFGHIKLMNOPQRSTUVWYZ".split("");

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                setupAmbientMusic();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function setupAmbientMusic() {
            musicGain = audioCtx.createGain();
            musicGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            musicGain.connect(audioCtx.destination);
            const notes = [261.63, 329.63, 392.00, 440.00];
            setInterval(() => {
                if (audioCtx.state === 'running') {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(notes[Math.floor(Math.random()*notes.length)], audioCtx.currentTime);
                    g.gain.setValueAtTime(0, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 1);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 5);
                    osc.connect(g); g.connect(musicGain);
                    osc.start(); osc.stop(audioCtx.currentTime + 5);
                }
            }, 6000);
        }

        function playSfx(freq, type='sine', dur=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function startGame(level) {
            initAudio();
            
            // Zaman Limitleri: A1: 3dk, A2: 4dk, B1: 5dk
            if (level === 'A1') timeLeft = 180;
            else if (level === 'A2') timeLeft = 240;
            else if (level === 'B1') timeLeft = 300;

            if (!window.allWords) { alert("Error: words.js not found!"); return; }

            session = alphabet.map(char => {
                let pool = window.allWords.filter(w => w.l === char && w.lv === level);
                if (pool.length === 0) pool = window.allWords.filter(w => w.l === char);
                const word = pool[Math.floor(Math.random() * pool.length)];
                return { ...word, status: 'pending' };
            });

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            
            renderWheel();
            startTimer();
            refreshUI();
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            const timerEl = document.getElementById('timer');
            
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0' + s : s}`;

                // Son 30 Saniye Efektleri
                if (timeLeft <= 30 && timeLeft > 0) {
                    timerEl.classList.add('urgent');
                    playSfx(1000, 'sine', 0.05); // Tik-tak sesi
                }

                if (timeLeft <= 0) {
                    timerEl.classList.remove('urgent');
                    endGame();
                }
            }, 1000);
        }

        function renderWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            const rect = document.getElementById('game-area').getBoundingClientRect();
            const radius = (rect.width / 2) - 25;
            const center = rect.width / 2;

            session.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'letter';
                div.id = `L-${i}`;
                div.innerText = item.l;
                const angle = (i / session.length) * (Math.PI * 2) - (Math.PI / 2);
                div.style.left = (center + radius * Math.cos(angle)) + 'px';
                div.style.top = (center + radius * Math.sin(angle)) + 'px';
                wheel.appendChild(div);
            });
        }

        function refreshUI() {
            const isFinished = session.every(w => w.status === 'correct' || w.status === 'wrong');
            if (isFinished) return endGame();

            while (session[currentIdx].status === 'correct' || session[currentIdx].status === 'wrong') {
                currentIdx = (currentIdx + 1) % session.length;
            }

            session.forEach((w, i) => {
                const el = document.getElementById(`L-${i}`);
                if (el) el.className = `letter ${w.status} ${i === currentIdx ? 'active' : ''}`;
            });

            const current = session[currentIdx];
            document.getElementById('definition').innerText = current.q;
            document.getElementById('hint-area').innerText = '';
            document.getElementById('userInput').value = '';
            
            if (window.innerWidth > 768) document.getElementById('userInput').focus();
            if (current.status === 'passed') getHint();

            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance(current.q);
            speech.lang = 'en-US';
            window.speechSynthesis.speak(speech);
        }

        function handleCheck() {
            const val = document.getElementById('userInput').value.toLowerCase().trim();
            if (!val) return;
            if (session[currentIdx].a.includes(val)) {
                session[currentIdx].status = 'correct';
                playSfx(880);
            } else {
                session[currentIdx].status = 'wrong';
                playSfx(220, 'sawtooth', 0.2);
            }
            next();
        }

        function getHint() {
            const w = session[currentIdx].a[0];
            document.getElementById('hint-area').innerText = `${w[0].toUpperCase()}...${w.slice(-1).toUpperCase()} (${w.length})`;
        }

        function handlePass() {
            session[currentIdx].status = 'passed';
            playSfx(440);
            next();
        }

        function next() {
            currentIdx = (currentIdx + 1) % session.length;
            refreshUI();
        }

        function endGame() {
            clearInterval(timerInterval);
            const correctCount = session.filter(w => w.status === 'correct').length;
            let html = `<h2>Results</h2><p style="font-size:1.5rem">Score: ${correctCount}/24</p><div style="max-height:250px; overflow-y:auto; width:100%"><table style="width:100%; border-collapse:collapse; font-size:0.9rem;">`;
            session.forEach(w => {
                html += `<tr style="border-bottom:1px solid #eee; background:${w.status==='correct'?'#f1fcf4':'#fff5f5'}">
                    <td style="padding:10px"><b>${w.l}</b></td>
                    <td>${w.status==='correct'?'✅':'❌'}</td>
                    <td style="text-align:right; padding-right:10px"><b>${w.a[0].toUpperCase()}</b></td>
                </tr>`;
            });
            html += `</table></div><button onclick="location.reload()" style="background:var(--soft-blue); width:100%; margin-top:20px; padding:15px; border-radius:10px">NEW GAME</button>`;
            document.getElementById('panel').innerHTML = html;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleCheck(); });
        window.addEventListener('resize', renderWheel);
    </script>
</body>
</html>
