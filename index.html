<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford 600 - Word Adventure</title>
    <style>
        :root { --coral: #ff8b94; --mint: #a8e6cf; --gold: #ffd080; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        
        #game-area { position: relative; width: 500px; height: 500px; margin: 20px; }
        .letter { 
            position: absolute; width: 40px; height: 40px; background: white; 
            border: 2px solid #ddd; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-weight: bold;
            transition: all 0.3s; transform: translate(-50%, -50%);
        }
        .active { background: var(--gold) !important; transform: translate(-50%, -50%) scale(1.3); z-index: 10; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .correct { background: var(--mint) !important; color: white; border-color: transparent; }
        .wrong { background: var(--coral) !important; color: white; border-color: transparent; }
        
        #panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        input { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 1.1rem; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #3498db; color: white; font-weight: bold; }
        .btn-hint { background: #f1c40f; }
        .btn-pass { background: #95a5a6; }
    </style>
</head>
<body>

    <h1>Word Adventure 🎡</h1>

    <div id="game-area">
        <div id="wheel"></div>
        <div id="overlay" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100;">
            <button onclick="startGame('A1')" style="margin:5px; width:150px;">A1 - Start</button><br>
            <button onclick="startGame('A2')" style="margin:5px; width:150px;">A2 - Start</button><br>
            <button onclick="startGame('B1')" style="margin:5px; width:150px;">B1 - Start</button>
        </div>
    </div>

    <div id="panel" style="display:none">
        <div id="timer" style="font-size:1.5rem; font-weight:bold">05:00</div>
        <p id="definition" style="font-style:italic; margin:15px 0"></p>
        <p id="hint-area" style="color:var(--coral); font-weight:bold; letter-spacing:2px"></p>
        <input type="text" id="userInput" placeholder="Your answer..." autocomplete="off">
        <div style="display:flex; gap:10px; justify-content:center">
            <button onclick="check()">Check</button>
            <button class="btn-hint" onclick="getHint()">Hint</button>
            <button class="btn-pass" onclick="pass()">Pass</button>
        </div>
    </div>

    <script src="words.js"></script>

    <script>
        let session = [], currentIdx = 0, score = 0, timeLeft = 300, timer;
        const alphabet = "ABCDEFGHIKLMNOPQRSTUVWYZ".split("");

        function playSound(freq, type = 'sine') {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function startGame(level) {
            if (!window.allWords) {
                alert("Error: words.js not loaded!");
                return;
            }

            // Harf başına 8 kelimeden rastgele birini seçme (Randomization)
            session = alphabet.map(char => {
                const pool = window.allWords.filter(w => w.l === char && w.lv === level);
                const randomWord = pool[Math.floor(Math.random() * pool.length)];
                return { ...randomWord, status: 'pending' };
            });

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('panel').style.display = 'block';
            
            renderWheel();
            startTimer();
            refreshUI();
        }

        function renderWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            const radius = 200;
            session.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'letter';
                div.id = `letter-${i}`;
                div.innerText = item.l;
                const angle = (i / session.length) * (Math.PI * 2) - (Math.PI / 2);
                div.style.left = (250 + radius * Math.cos(angle)) + 'px';
                div.style.top = (250 + radius * Math.sin(angle)) + 'px';
                wheel.appendChild(div);
            });
        }

        function refreshUI() {
            // Oyun bitti mi?
            if (session.every(w => w.status !== 'pending' && w.status !== 'passed')) {
                endGame(); return;
            }

            // Pas geçilen veya bekleyen ilk kelimeye odaklan
            while (session[currentIdx].status === 'correct' || session[currentIdx].status === 'wrong') {
                currentIdx = (currentIdx + 1) % session.length;
            }

            session.forEach((w, i) => {
                document.getElementById(`letter-${i}`).className = `letter ${w.status} ${i === currentIdx ? 'active' : ''}`;
            });

            document.getElementById('definition').innerText = session[currentIdx].q;
            document.getElementById('hint-area').innerText = '';
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').focus();
            speak(session[currentIdx].q);
        }

        function check() {
            const input = document.getElementById('userInput').value.toLowerCase().trim();
            const correctAnswers = session[currentIdx].a.map(v => v.toLowerCase());

            if (correctAnswers.includes(input)) {
                session[currentIdx].status = 'correct';
                playSound(880); // Başarı sesi
            } else {
                session[currentIdx].status = 'wrong';
                playSound(220, 'sawtooth'); // Hata sesi
            }
            
            next();
        }

        function getHint() {
            const word = session[currentIdx].a[0];
            document.getElementById('hint-area').innerText = `${word[0].toUpperCase()}...${word.slice(-1).toUpperCase()} (${word.length})`;
            playSound(440);
        }

        function pass() {
            session[currentIdx].status = 'passed';
            playSound(660);
            next();
        }

        function next() {
            currentIdx = (currentIdx + 1) % session.length;
            setTimeout(refreshUI, 400);
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' + s : s}`;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            clearInterval(timer);
            const correctCount = session.filter(w => w.status === 'correct').length;
            alert(`Game Over! Correct answers: ${correctCount} / 24`);
            location.reload();
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') check();
        });
    </script>
</body>
</html>
